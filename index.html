<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ex in JS!</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body style="background-color: #bebebe">
    <main>
      <div class="container">
        <div class="row justify-content-center mt-4">
          <div class="col-12 col-md-6">
            <h2 class="text-center">INSERISCI IL TUO NOME UTENTE</h2>
            <section>
              <div class="mb-3">
                <textarea
                  class="form-control"
                  id="notepad-content"
                  rows="1"
                  placeholder="Lorem ipsum..."
                ></textarea>
              </div>
              <div class="text-center">
                <h2>SEI LOGGATO CON IL NOME UTENTE:</h2>
                <h3 id="output"></h3>
              </div>
              <div class="d-flex justify-content-center gap-3">
                <button class="btn btn-success" onclick="save()">SALVA</button>
                <button class="btn btn-info" onclick="load()">CARICA</button>
                <button class="btn btn-warning" onclick="reset()">
                  SVUOTA
                </button>
              </div>
            </section>
          </div>
        </div>
      </div>
    </main>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="./ex1.js"></script>
  </body>
</html>
